# Hackerbadge WLED build — extends the stock ESP32-S3 8MB + OPI PSRAM env
# with this board's LED pin and count defaults.
#
# Used by docker compose; copied into the WLED tree at build time.

[platformio]
default_envs = hackerbadge

[env:hackerbadge]
extends = env:esp32s3dev_8MB_opi
build_unflags =
  -D WLED_RELEASE_NAME=\"ESP32-S3_8MB_opi\"
build_flags =
  ${env:esp32s3dev_8MB_opi.build_flags}
  -D WLED_RELEASE_NAME=\"Hackerbadge\"
  -D SERVERNAME='"Hackerbadge"'
  -D DATA_PINS=9
  -D LEDPIN=9
  -D DEFAULT_LED_COUNT=37
  -D PIXEL_COUNTS=37
  -D DEFAULT_LED_COLOR_ORDER=COL_ORDER_GRB

; Fallback if OPI PSRAM init fails on a particular Xiao unit:
;   PIO_ENV=hackerbadge_qspi docker compose run --rm build
[env:hackerbadge_qspi]
extends = env:esp32s3dev_8MB_qspi
build_unflags =
  -D WLED_RELEASE_NAME=\"ESP32-S3_8MB_qspi\"
build_flags =
  ${env:esp32s3dev_8MB_qspi.build_flags}
  -D WLED_RELEASE_NAME=\"Hackerbadge_qspi\"
  -D SERVERNAME='"Hackerbadge"'
  -D DATA_PINS=9
  -D LEDPIN=9
  -D DEFAULT_LED_COUNT=37
  -D PIXEL_COUNTS=37
  -D DEFAULT_LED_COLOR_ORDER=COL_ORDER_GRB
