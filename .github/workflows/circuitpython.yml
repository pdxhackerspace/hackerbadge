name: CircuitPython

on:
  push:
    branches: [main]
    paths:
      - "firmware/test/circuitpython/**"
      - ".github/workflows/circuitpython.yml"
  pull_request:
    paths:
      - "firmware/test/circuitpython/**"
      - ".github/workflows/circuitpython.yml"
  workflow_dispatch:

jobs:
  build:
    name: CircuitPython test firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check with CPython
        run: python3 -m py_compile firmware/test/circuitpython/code.py

      # mpy-cross is the MicroPython bytecode cross-compiler; this catches
      # anything CircuitPython's compiler would reject, not just CPython syntax.
      - name: Compile with mpy-cross
        run: |
          pip install mpy-cross
          mpy-cross -o /tmp/code.mpy firmware/test/circuitpython/code.py
