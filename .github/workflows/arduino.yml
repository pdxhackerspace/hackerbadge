name: Arduino

on:
  push:
    branches: [main]
    paths:
      - "firmware/test/arduino/**"
      - ".github/workflows/arduino.yml"
  pull_request:
    paths:
      - "firmware/test/arduino/**"
      - ".github/workflows/arduino.yml"
  workflow_dispatch:

jobs:
  build:
    name: Arduino test firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Persists the arduino-cli data dir (ESP32 core, libraries, indexes).
      - name: Cache Arduino CLI downloads
        uses: actions/cache@v4
        with:
          path: |
            firmware/test/arduino/cache
            !firmware/test/arduino/cache/staging
          key: arduino-${{ hashFiles('firmware/test/arduino/Dockerfile', 'firmware/test/arduino/entrypoint.sh', 'firmware/test/arduino/docker-compose*.yml') }}
          restore-keys: |
            arduino-

      - name: Compile badge_test sketch
        working-directory: firmware/test/arduino
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm build compile

      - name: Fix cache permissions
        if: always()
        run: |
          if [ -d firmware/test/arduino/cache ]; then
            sudo chown -R "$(id -u):$(id -g)" firmware/test/arduino/cache
          fi
