name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  esphome:
    name: ESPHome test firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Persists PlatformIO toolchains/platforms (ESP-IDF, ESP32 core) and the
      # ESPHome build dir (compiled objects) across runs.
      - name: Cache PlatformIO downloads and build dir
        uses: actions/cache@v4
        with:
          path: |
            firmware/test/esphome/cache
            firmware/test/esphome/.esphome
          key: esphome-${{ hashFiles('firmware/test/esphome/badge_test.yaml', 'firmware/test/esphome/docker-compose*.yml') }}
          restore-keys: |
            esphome-

      - name: Compile badge_test.yaml
        working-directory: firmware/test/esphome
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm esphome compile badge_test.yaml

      # The container runs as root; make the cache readable so the post-job
      # cache save step can tar it.
      - name: Fix cache permissions
        if: always()
        run: |
          for d in firmware/test/esphome/cache firmware/test/esphome/.esphome; do
            [ -d "$d" ] && sudo chown -R "$(id -u):$(id -g)" "$d"
          done
          true

  arduino:
    name: Arduino test firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Persists the arduino-cli data dir (ESP32 core, libraries, indexes).
      - name: Cache Arduino CLI downloads
        uses: actions/cache@v4
        with:
          path: |
            firmware/test/arduino/cache
            !firmware/test/arduino/cache/staging
          key: arduino-${{ hashFiles('firmware/test/arduino/Dockerfile', 'firmware/test/arduino/entrypoint.sh', 'firmware/test/arduino/docker-compose*.yml') }}
          restore-keys: |
            arduino-

      - name: Compile badge_test sketch
        working-directory: firmware/test/arduino
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm build compile

      - name: Fix cache permissions
        if: always()
        run: |
          if [ -d firmware/test/arduino/cache ]; then
            sudo chown -R "$(id -u):$(id -g)" firmware/test/arduino/cache
          fi
